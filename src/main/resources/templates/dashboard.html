<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <title>대시보드</title>
</head>

<body>
<div layout:fragment="content">
    <h2 class="mb-4">대시보드123</h2>
    <!-- 접근 권한 없음 알럿  -->
    <div th:if="${param.error != null}"
         class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong>접근 권한이 없습니다.</strong> 관리자에게 문의하세요.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 작업지시 현황 -->
    <div class="row mb-4">
        <div class="col-12">
            <h5>오늘의 작업지시 현황</h5>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-secondary">
                <div class="card-body text-center">
                    <h6 class="card-title">대기</h6>
                    <h2 id="waitCount" th:text="${dashboard.waitCount}"></h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body text-center">
                    <h6 class="card-title">진행중</h6>
                    <h2 id="inProgressCount" th:text="${dashboard.inProgressCount}"></h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body text-center">
                    <h6 class="card-title">완료</h6>
                    <h2 id="doneCount" th:text="${dashboard.doneCount}"></h2>
                </div>
            </div>
        </div>
    </div>

    <!-- 생산 실적 현황 -->
    <div class="row mb-4">
        <div class="col-12">
            <h5>오늘의 생산 실적</h5>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-info">
                <div class="card-body text-center">
                    <h6 class="card-title">양품 수량</h6>
                    <h2 id="totalGoodQty" th:text="${dashboard.totalGoodQty}"></h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger">
                <div class="card-body text-center">
                    <h6 class="card-title">불량 수량</h6>
                    <h2 id="totalDefectQty" th:text="${dashboard.totalDefectQty}"></h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-warning">
                <div class="card-body text-center">
                    <h6 class="card-title">불량률</h6>
                    <h2 id="defectRate" th:text="${dashboard.defectRate} + '%'"></h2>
                </div>
            </div>
        </div>
    </div>

    <!-- 진척률 현황 -->
    <div class="row">
        <div class="col-12">
            <h5>작업지시 진척률 현황</h5>
            <div style="max-height: 400px; overflow-y: auto; border: 1px solid #444;">
                <table id="progressTable" class="table table-bordered table-hover mb-0">
                    <thead class="table-dark" style="position: sticky; top: 0;">
                    <tr>
                        <th>작업지시 번호</th>
                        <th>제품명</th>
                        <th>목표수량</th>
                        <th>실제생산량</th>
                        <th>진척률</th>
                        <th>상태</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${dashboard.progressRateList}">
                        <td th:text="${item.order_id}"></td>
                        <td th:text="${item.product_name}"></td>
                        <td th:text="${item.target_qty}"></td>
                        <td th:text="${item.actual_qty}"></td>
                        <td th:text="${item.progress_rate} + '%'"></td>
                        <td th:text="${item.status}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- WebSocket 스크립트 -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
        const socket = new SockJS('/ws');
        const stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            console.log('WebSocket 연결됨: ' + frame);

            stompClient.subscribe('/topic/dashboard', function (message) {
                const data = JSON.parse(message.body);

                // 작업지시 현황 업데이트
                document.getElementById('waitCount').innerText = data.waitCount;
                document.getElementById('inProgressCount').innerText = data.inProgressCount;
                document.getElementById('doneCount').innerText = data.doneCount;

                // 생산 실적 업데이트
                document.getElementById('totalGoodQty').innerText = data.totalGoodQty;
                document.getElementById('totalDefectQty').innerText = data.totalDefectQty;
                document.getElementById('defectRate').innerText = data.defectRate + '%';

                // 진척률 테이블 업데이트
                const tbody = document.querySelector('#progressTable tbody');
                tbody.innerHTML = '';
                data.progressRateList.forEach(item => {
                    const row = `<tr>
                        <td>${item.order_id}</td>
                        <td>${item.product_name}</td>
                        <td>${item.target_qty}</td>
                        <td>${item.actual_qty}</td>
                        <td>${item.progress_rate}%</td>
                        <td>${item.status}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            });
        });
    </script>
</div>
</body>
</html>
