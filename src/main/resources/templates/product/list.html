<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>제품 목록</title>
</head>
<body>

<h1>제품 목록</h1>
<!-- 네비게이션 -->
<nav>
    <a href="/">대시보드</a> |
    <a href="/product/list">제품 관리</a> |
    <a href="/workorder/list">작업지시</a> |
    <a href="/result/list">생산 실적</a>
</nav>
<hr>
<a href="/product/create">제품 등록</a>
<br><br>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>제품명</th>
        <th>제품코드</th>
        <th>단위</th>
        <th>등록일</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${productList}">
        <td th:text="${product.productId}"></td>
        <td th:text="${product.productName}"></td>
        <td th:text="${product.productCode}"></td>
        <td th:text="${product.unit}"></td>
        <td th:text="${product.createdAt}"></td>
        <td>
            <a th:href="@{/product/edit/{id}(id=${product.productId})}">수정</a>
            <form th:action="@{/product/delete/{id}(id=${product.productId})}" method="post" style="display:inline">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
