<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <title>제품 목록</title>
</head>

<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>제품 목록</h2>
        <a href="/product/create" class="btn btn-primary">제품 등록</a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>제품명</th>
            <th>제품코드</th>
            <th>단위</th>
            <th>등록일</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${productList}">
            <td th:text="${product.productId}"></td>
            <td th:text="${product.productName}"></td>
            <td th:text="${product.productCode}"></td>
            <td th:text="${product.unit}"></td>
            <td th:text="${product.createdAt}"></td>
            <td>
                <a th:href="@{/product/edit/{id}(id=${product.productId})}"
                   class="btn btn-sm btn-warning">수정</a>
                <form th:action="@{/product/delete/{id}(id=${product.productId})}"
                      method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
