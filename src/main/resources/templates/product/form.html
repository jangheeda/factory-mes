<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>제품 등록/수정</title>
</head>
<body>

<!-- 등록 폼 -->
<div th:if="${product.productId == 0}">
    <h1>제품 등록</h1>
    <form th:action="@{/product/create}" method="post">
        <table>
            <tr>
                <td>제품명</td>
                <td><input type="text" name="productName" required></td>
            </tr>
            <tr>
                <td>제품코드</td>
                <td><input type="text" name="productCode" required></td>
            </tr>
            <tr>
                <td>단위</td>
                <td><input type="text" name="unit" required></td>
            </tr>
        </table>
        <br>
        <button type="submit">저장</button>
        <a href="/product/list">취소</a>
    </form>
</div>

<!-- 수정 폼 -->
<div th:if="${product.productId != 0}">
    <h1>제품 수정</h1>
    <form th:action="@{/product/edit/{id}(id=${product.productId})}" method="post">
        <table>
            <tr>
                <td>제품명</td>
                <td><input type="text" name="productName" th:value="${product.productName}" required></td>
            </tr>
            <tr>
                <td>제품코드</td>
                <td><input type="text" name="productCode" th:value="${product.productCode}" required></td>
            </tr>
            <tr>
                <td>단위</td>
                <td><input type="text" name="unit" th:value="${product.unit}" required></td>
            </tr>
        </table>
        <br>
        <button type="submit">저장</button>
        <a href="/product/list">취소</a>
    </form>
</div>

</body>
</html>
