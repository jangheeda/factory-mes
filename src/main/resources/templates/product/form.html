<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <title>제품 등록/수정</title>
</head>

<body>
<div layout:fragment="content">

    <!-- 등록 폼 -->
    <div th:if="${product.productId == 0}">
        <h2 class="mb-4">제품 등록</h2>
        <form th:action="@{/product/create}" method="post">
            <div class="mb-3">
                <label class="form-label">제품명</label>
                <input type="text" name="productName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">제품코드</label>
                <input type="text" name="productCode" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">단위</label>
                <input type="text" name="unit" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">저장</button>
            <a href="/product/list" class="btn btn-secondary">취소</a>
        </form>
    </div>

    <!-- 수정 폼 -->
    <div th:if="${product.productId != 0}">
        <h2 class="mb-4">제품 수정</h2>
        <form th:action="@{/product/edit/{id}(id=${product.productId})}" method="post">
            <div class="mb-3">
                <label class="form-label">제품명</label>
                <input type="text" name="productName" class="form-control"
                       th:value="${product.productName}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">제품코드</label>
                <input type="text" name="productCode" class="form-control"
                       th:value="${product.productCode}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">단위</label>
                <input type="text" name="unit" class="form-control"
                       th:value="${product.unit}" required>
            </div>
            <button type="submit" class="btn btn-primary">저장</button>
            <a href="/product/list" class="btn btn-secondary">취소</a>
        </form>
    </div>

</div>
</body>
</html>
