<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>작업지시 목록</title>
</head>
<body>
<h1>작업지시 목록</h1>
<!-- 네비게이션 -->
<nav>
    <a href="/">대시보드</a> |
    <a href="/product/list">제품 관리</a> |
    <a href="/workorder/list">작업지시</a> |
    <a href="/result/list">생산 실적</a>
</nav>
<hr>
<a href="/workorder/create">작업지시 등록</a>
<br><br>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>제품명</th>
        <th>목표수량</th>
        <th>상태</th>
        <th>작업일</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${workOrderList}">
        <td th:text="${order.orderId}"></td>
        <td th:text="${order.productName}"></td>
        <td th:text="${order.targetQty}"></td>
        <td th:text="${order.status}"></td>
        <td th:text="${order.orderDate}"></td>
        <td>
            <form th:action="@{/workorder/status/{id}(id=${order.orderId})}" method="post" style="display:inline">
                <select name="status">
                    <option value="대기">대기</option>
                    <option value="진행중">진행중</option>
                    <option value="완료">완료</option>
                </select>
                <button type="submit">변경</button>
            </form>
            <form th:action="@{/workorder/delete/{id}(id=${order.orderId})}" method="post" style="display:inline">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
