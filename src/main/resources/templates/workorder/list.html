<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/default}">

<head>
    <title>작업지시 목록</title>
</head>

<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>작업지시 목록 <span class="fs-6 text-muted" th:text="'(총 ' + ${totalCount} + '건)'"></span></h2>
        <a sec:authorize="hasRole('ADMIN')" href="/workorder/create" class="btn btn-primary">작업지시 등록</a>
    </div>
    <!-- [S] 검색 폼 -->
    <form th:action="@{/workorder/list}" method="get" class="mb-4">
        <div class="row g-2">
            <div class="col-md-2">
                <select name="status" class="form-select" th:value="${searchDto.status}">
                    <option value="">전체 상태</option>
                    <option value="대기" th:selected="${searchDto.status == '대기'}">대기</option>
                    <option value="진행중" th:selected="${searchDto.status == '진행중'}">진행중</option>
                    <option value="완료" th:selected="${searchDto.status == '완료'}">완료</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="text" name="productName" class="form-control"
                       placeholder="제품명 검색" th:value="${searchDto.productName}">
            </div>
            <div class="col-md-2">
                <input type="date" name="startDate" class="form-control"
                       th:value="${searchDto.startDate}">
            </div>
            <div class="col-md-2">
                <input type="date" name="endDate" class="form-control"
                       th:value="${searchDto.endDate}">
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-primary w-100">검색</button>
            </div>
            <div class="col-md-1">
                <a href="/workorder/list" class="btn btn-secondary w-100">초기화</a>
            </div>
        </div>
    </form>
    <!-- [E] 검색 폼 -->

    <!-- [S] 목록 테이블 -->
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>제품명</th>
            <th>목표수량</th>
            <th>실제생산량</th>
            <th>진척률</th>
            <th>상태</th>
            <th>작업일</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${workOrderList}">
            <td th:text="${order.orderId}"></td>
            <td th:text="${order.productName}"></td>
            <td th:text="${order.targetQty}"></td>
            <td th:text="${order.actualQty}"></td>
            <td th:text="${order.progressRate} + '%'"></td>
            <td>
                <!-- 상태별 배지 색상 -->
                <span th:class="${order.status == '대기'} ? 'badge bg-secondary' :
                                    (${order.status == '진행중'} ? 'badge bg-primary' : 'badge bg-success')"
                      th:text="${order.status}"></span>
            </td>
            <td th:text="${order.orderDate}"></td>
            <td>
                <form th:action="@{/workorder/status/{id}(id=${order.orderId})}"
                      method="post" style="display:inline">
                    <select name="status" class="form-select form-select-sm d-inline-block w-auto">
                        <option value="대기">대기</option>
                        <option value="진행중">진행중</option>
                        <option value="완료">완료</option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-warning">변경</button>
                </form>
                <form sec:authorize="hasRole('ADMIN')" th:action="@{/workorder/delete/{id}(id=${order.orderId})}"
                      method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <!-- [E] 목록 테이블 -->

    <!-- [S] 페이징 -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <!-- 이전 버튼 -->
            <li class="page-item" th:classappend="${searchDto.page == 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/workorder/list(page=${searchDto.page - 1}, status=${searchDto.status}, productName=${searchDto.productName}, startDate=${searchDto.startDate}, endDate=${searchDto.endDate})}">
                    이전
                </a>
            </li>
            <!-- 페이지 번호 -->
            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == searchDto.page} ? 'active'">
                <a class="page-link"
                   th:href="@{/workorder/list(page=${i}, status=${searchDto.status}, productName=${searchDto.productName}, startDate=${searchDto.startDate}, endDate=${searchDto.endDate})}"
                   th:text="${i}">
                </a>
            </li>
            <!-- 다음 버튼 -->
            <li class="page-item" th:classappend="${searchDto.page == totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/workorder/list(page=${searchDto.page + 1}, status=${searchDto.status}, productName=${searchDto.productName}, startDate=${searchDto.startDate}, endDate=${searchDto.endDate})}">
                    다음
                </a>
            </li>
        </ul>
    </nav>
    <!-- [E] 페이징 -->
</div>
</body>
</html>
