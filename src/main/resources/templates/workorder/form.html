<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <title>작업지시 등록</title>
</head>

<body>
<div layout:fragment="content">
    <h2 class="mb-4">작업지시 등록</h2>

    <form th:action="@{/workorder/create}" method="post">
        <div class="mb-3">
            <label class="form-label">제품 선택</label>
            <select name="productId" class="form-select">
                <option th:each="product : ${productList}"
                        th:value="${product.productId}"
                        th:text="${product.productName}">
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">목표수량</label>
            <input type="number" name="targetQty" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">작업일</label>
            <input type="date" name="orderDate" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">저장</button>
        <a href="/workorder/list" class="btn btn-secondary">취소</a>
    </form>
</div>
</body>
</html>
