<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Factory MES">Factory MES</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/darkly/bootstrap.min.css" rel="stylesheet">

    <style>
        .form-control, .form-select {
            background-color: #495057;
            color: #fff;
            border-color: #6c757d;
        }
        .form-control:focus, .form-select:focus {
            background-color: #495057;
            color: #fff;
            border-color: #adb5bd;
            box-shadow: none;
        }
    </style>

</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏭 Factory MES</a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" href="/">대시보드</a>
            <a class="nav-link" href="/product/list">제품 관리</a>
            <a class="nav-link" href="/workorder/list">작업지시</a>
            <a class="nav-link" href="/result/list">생산 실적</a>
        </div>
        <div class="navbar-nav">
            <!-- 로그인한 사용자 이름 표시 -->
            <span class="navbar-text text-white me-3" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<!-- 메인 컨텐츠 -->
<div class="container mt-4 mb-5">
    <div layout:fragment="content"></div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
