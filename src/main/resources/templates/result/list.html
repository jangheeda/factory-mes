<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/default}">


<head>
    <title>생산 실적 목록</title>
</head>

<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>생산 실적 목록 <span class="fs-6 text-muted" th:text="'(총 ' + ${totalCount} + '건)'"></span></h2>
        <a href="/result/create" class="btn btn-primary">실적 등록</a>
    </div>

    <!-- [S] 검색 폼 -->
    <form th:action="@{/result/list}" method="get" class="mb-4">
        <div class="row g-2">
            <div class="col-md-2">
                <input type="text" name="productName" class="form-control"
                       placeholder="제품명 검색" th:value="${searchDto.productName}">
            </div>
            <div class="col-md-2">
                <select name="defectType" class="form-select">
                    <option value="">전체 불량원인</option>
                    <option value="해당없음" th:selected="${searchDto.defectType == '해당없음'}">해당없음</option>
                    <option value="치수불량" th:selected="${searchDto.defectType == '치수불량'}">치수불량</option>
                    <option value="외관불량" th:selected="${searchDto.defectType == '외관불량'}">외관불량</option>
                    <option value="기능불량" th:selected="${searchDto.defectType == '기능불량'}">기능불량</option>
                    <option value="기타" th:selected="${searchDto.defectType == '기타'}">기타</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="text" name="worker" class="form-control"
                       placeholder="작업자 검색" th:value="${searchDto.worker}">
            </div>
            <div class="col-md-2">
                <input type="date" name="startDate" class="form-control"
                       th:value="${searchDto.startDate}">
            </div>
            <div class="col-md-2">
                <input type="date" name="endDate" class="form-control"
                       th:value="${searchDto.endDate}">
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-primary w-100">검색</button>
            </div>
            <div class="col-md-1">
                <a href="/result/list" class="btn btn-secondary w-100">초기화</a>
            </div>
        </div>
    </form>
    <!-- [E] 검색 폼 -->

    <!-- [S] 목록 테이블 -->
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>제품명</th>
            <th>목표수량</th>
            <th>양품수량</th>
            <th>불량수량</th>
            <th>불량원인</th>
            <th>작업자</th>
            <th>실적일</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="result : ${resultList}">
            <td th:text="${result.resultId}"></td>
            <td th:text="${result.productName}"></td>
            <td th:text="${result.targetQty}"></td>
            <td th:text="${result.goodQty}"></td>
            <td th:text="${result.defectQty}"></td>
            <td th:text="${result.defectType}"></td>
            <td th:text="${result.worker}"></td>
            <td th:text="${result.resultDate}"></td>
            <td>
                <a th:href="@{/result/edit/{id}(id=${result.resultId})}"
                   class="btn btn-sm btn-warning">수정</a>
                <form sec:authorize="hasRole('ADMIN')" th:action="@{/result/delete/{id}(id=${result.resultId})}"
                      method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <!-- [E] 목록 테이블 -->

    <!-- [S] 페이징 -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${searchDto.page == 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/result/list(page=${searchDto.page - 1}, productName=${searchDto.productName}, worker=${searchDto.worker}, defectType=${searchDto.defectType}, startDate=${searchDto.startDate}, endDate=${searchDto.endDate})}">
                    이전
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == searchDto.page} ? 'active'">
                <a class="page-link"
                   th:href="@{/result/list(page=${i}, productName=${searchDto.productName}, worker=${searchDto.worker}, defectType=${searchDto.defectType}, startDate=${searchDto.startDate}, endDate=${searchDto.endDate})}"
                   th:text="${i}">
                </a>
            </li>
            <li class="page-item" th:classappend="${searchDto.page == totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/result/list(page=${searchDto.page + 1}, productName=${searchDto.productName}, worker=${searchDto.worker}, defectType=${searchDto.defectType}, startDate=${searchDto.startDate}, endDate=${searchDto.endDate})}">
                    다음
                </a>
            </li>
        </ul>
    </nav>
    <!-- [E] 페이징 -->

</div>
</body>
</html>
